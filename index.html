<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="app_title">BikeCon 控制台</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <div id="portrait-layout">
        <header>
            <span style="color:var(--primary-accent); font-weight:bold;" data-i18n="app_title">BikeCon 控制台</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="joycon-battery" style="font-size:0.8rem; color:#aaa" data-i18n="joycon_label">JoyCon: --</span>
            </div>
        </header>
        <main>
            <div id="tab-bike" class="tab-content active">
                <div class="dashboard">
                    <div class="metrics">
                        <div class="metric-card">
                            <div class="metric-label" data-i18n="metric_rpm">踏频</div>
                            <div class="metric-value inactive"><span id="rpm-val">--</span><span class="metric-unit">RPM</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label" data-i18n="metric_power">功率</div>
                            <div class="metric-value inactive"><span id="power-val">--</span><span class="metric-unit">W</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label" data-i18n="metric_speed">速度</div>
                            <div class="metric-value inactive"><span id="speed-val">--</span><span class="metric-unit">km/h</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label" data-i18n="metric_resistance">阻力</div>
                            <div class="metric-value inactive"><span id="resist-val">--</span><span class="metric-unit">Lv</span></div>
                        </div>
                    </div>
                    <div id="bt-status" class="status-line" data-i18n="status_sync">获取单车状态中…</div>
                    <div id="session-time" class="status-line">本次时长 --:--</div>
                    <div class="controls">
                        <div class="ctrl-row">
                            <button id="start-btn" class="ctrl-btn primary" onclick="sendControl('start')">开始</button>
                            <button class="ctrl-btn" onclick="sendControl('pause')" data-i18n="btn_pause">暂停</button>
                            <button class="ctrl-btn danger" onclick="sendControl('stop')" data-i18n="btn_stop">停止</button>
                        </div>
                        <div id="resistance-box" class="dial-box">
                            <div class="dial-label" data-i18n="resistance_control">阻力调节</div>
                            <div class="dial-value"><span id="resist-display">1</span></div>
                            <input id="resistance-dial" class="dial-range" type="range" min="1" max="24" step="1" value="1" disabled>
                            <div class="dial-scale">
                                <span>1</span>
                                <span>24</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="tab-config" class="tab-content">
                <div class="cfg-box">
                    <!--
                    <label>输入源设置 (自动协调模式)</label>
                    <select disabled>
                        <option value="auto">混合模式 (优先单车)</option>
                    </select>

                    <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">
                    -->

                    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin:10px 0;">
                        <span data-i18n="language_label" style="flex:1; min-width:0; white-space:nowrap;">语言（Language）</span>
                        <select id="lang-select" onchange="setLocale(this.value)" style="flex:0 0 120px; width:120px; background:#111; color:#fff; border:1px solid #444; border-radius:6px; padding:6px 8px;">
                            <option value="zh" data-i18n="language_zh">中文</option>
                            <option value="en" data-i18n="language_en">English</option>
                        </select>
                    </div>
                    <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">

                    <label data-i18n="ftms_title">FTMS 服务</label>
                    <div style="display:flex; align-items:center; justify-content:space-between; margin:10px 0;">
                        <span id="ftms-status" style="color:#888;">--</span>
                        <button id="ftms-toggle" class="ctrl-btn" style="padding:8px 12px;" onclick="toggleFTMS()">--</button>
                    </div>
                    <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">

                    <label data-i18n="bike_target_label">🚴 单车映射目标</label>
                    <select id="bike-target" onchange="sendBikeConfig()">
                        <option value="disabled" data-i18n="opt_disabled">-- 禁用映射 --</option>
                        <optgroup label="模拟摇杆" data-i18n-label="opt_stick_group">
                            <option value="ly_inv" data-i18n="opt_ly_inv">左摇杆 - 上推 (前进)</option>
                            <option value="ly" data-i18n="opt_ly">左摇杆 - 下推</option>
                            <option value="lx_inv" data-i18n="opt_lx_inv">左摇杆 - 左推</option>
                            <option value="lx" data-i18n="opt_lx">左摇杆 - 右推</option>
                            <option value="ry_inv" data-i18n="opt_ry_inv">右摇杆 - 上推 (油门)</option>
                            <option value="ry" data-i18n="opt_ry">右摇杆 - 下推</option>
                        </optgroup>
                        <optgroup label="线性扳机" data-i18n-label="opt_trigger_group">
                            <option value="lt" data-i18n="opt_lt">左扳机 (LT)</option>
                            <option value="rt" data-i18n="opt_rt">右扳机 (RT)</option>
                        </optgroup>
                        <optgroup label="数字按钮" data-i18n-label="opt_button_group">
                            <option value="btn_a" data-i18n="opt_btn_a">按键 A</option>
                            <option value="btn_b" data-i18n="opt_btn_b">按键 B</option>
                            <option value="btn_x" data-i18n="opt_btn_x">按键 X</option>
                            <option value="btn_y" data-i18n="opt_btn_y">按键 Y</option>
                            <option value="btn_lb" data-i18n="opt_btn_lb">左肩键 (LB)</option>
                            <option value="btn_rb" data-i18n="opt_btn_rb">右肩键 (RB)</option>
                            <option value="btn_start" data-i18n="opt_btn_start">START</option>
                            <option value="btn_select" data-i18n="opt_btn_select">SELECT</option>
                        </optgroup>
                    </select>

                    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                        <label data-i18n="bike_max_rpm_label">最大 RPM (满量程)</label>
                        <span id="max-rpm-display" style="color:var(--primary-accent)">90</span>
                    </div>
                    <input type="range" id="bike-max-rpm" min="30" max="160" value="90" step="5" 
                        style="width:100%; margin-top:10px;" 
                        oninput="document.getElementById('max-rpm-display').innerText=this.value" 
                        onchange="sendBikeConfig()">
                </div>
            </div>
            <div id="tab-history" class="tab-content">
                <div class="history-wrap">
                    <div class="history-header">
                        <div class="history-title" data-i18n="history_title">历史记录</div>
                        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
                            <input id="history-from" type="date" style="background:#111; color:#eee; border:1px solid #444; border-radius:6px; padding:6px 8px;">
                            <input id="history-to" type="date" style="background:#111; color:#eee; border:1px solid #444; border-radius:6px; padding:6px 8px;">
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="applyHistoryFilter()" data-i18n="history_filter">筛选</button>
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="clearHistoryFilter()" data-i18n="history_clear">清空</button>
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="refreshHistory()" data-i18n="history_refresh">刷新</button>
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="exportHistoryCSV()" data-i18n="history_export">导出 CSV</button>
                        </div>
                    </div>
                    <div id="history-list" class="history-list">
                        <div class="history-empty" data-i18n="history_empty">暂无记录</div>
                    </div>
                </div>
            </div>
        </main>
        <nav>
            <div class="nav-btn active" onclick="switchTab('bike', this)" data-i18n="tab_bike">🚴 单车</div>
            <div class="nav-btn" onclick="enterGamepad()" data-i18n="tab_gamepad">🎮 手柄</div>
            <div class="nav-btn" onclick="switchTab('history', this); refreshHistory()" data-i18n="tab_history">📜 记录</div>
            <div class="nav-btn" onclick="switchTab('config', this)" data-i18n="tab_settings">⚙️ 设置</div>
        </nav>
    </div>

    <div id="landscape-gamepad">
        <div class="exit-pill" onclick="exitGamepad()" data-i18n="gamepad_exit">✕ 退出</div>

        <div class="trigger tr-l" ontouchstart="trigger(0,255)" ontouchend="trigger(0,128)">LT</div>
        <div class="trigger tr-r" ontouchstart="trigger(1,255)" ontouchend="trigger(1,128)">RT</div>

        <div class="shoulder sh-l" ontouchstart="btn(5,1)" ontouchend="btn(5,0)">LB</div>
        <div class="shoulder sh-r" ontouchstart="btn(6,1)" ontouchend="btn(6,0)">RB</div>

        <div class="stick-zone stick-l" id="stick-l">
            <div class="stick-knob"></div>
        </div>

        <div class="dpad-zone">
            <div class="dpad-key dp-btn dp-u" ontouchstart="btn(13,1)" ontouchend="btn(13,0)"></div>
            <div class="dpad-key dp-btn dp-l" ontouchstart="btn(15,1)" ontouchend="btn(15,0)"></div>
            <div class="dpad-key dp-c"></div>
            <div class="dpad-key dp-btn dp-r" ontouchstart="btn(16,1)" ontouchend="btn(16,0)"></div>
            <div class="dpad-key dp-btn dp-d" ontouchstart="btn(14,1)" ontouchend="btn(14,0)"></div>
        </div>

        <div class="abxy-zone">
            <div class="gp-btn face-btn btn-y" ontouchstart="btn(4,1)" ontouchend="btn(4,0)"><span>Y</span></div>
            <div class="gp-btn face-btn btn-x" ontouchstart="btn(3,1)" ontouchend="btn(3,0)"><span>X</span></div>
            <div class="gp-btn face-btn btn-b" ontouchstart="btn(2,1)" ontouchend="btn(2,0)"><span>B</span></div>
            <div class="gp-btn face-btn btn-a" ontouchstart="btn(1,1)" ontouchend="btn(1,0)"><span>A</span></div>
        </div>

        <div class="stick-zone stick-r" id="stick-r">
            <div class="stick-knob"></div>
        </div>

        <div class="center-stack">
            <div class="btn-menu" ontouchstart="btn(7,1)" ontouchend="btn(7,0)">SELECT</div>
            <div class="btn-menu" ontouchstart="btn(8,1)" ontouchend="btn(8,0)">START</div>
        </div>
    </div>

    <script src="/static/i18n.js" defer></script>
    <script src="/static/history.js" defer></script>
    <script src="/static/settings.js" defer></script>
    <script src="/static/app.js" defer></script>
    <script src="/static/gamepad.js" defer></script>
</body>
</html>
