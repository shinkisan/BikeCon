<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Keep 控制台</title>
    <style>
        :root {
            --bg-color: #2b2b2b;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --active-bg: #e0e0e0;
            --active-border: #fff;
            --primary-accent: #00ff88;
            
            --unit: 1vmin; 
            --stick-size: 30vmin; /* 保持你调整的大小 */
            --btn-size: 13vmin;   /* 保持你调整的大小 */
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #333 0%, #1a1a1a 100%);
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh;
            overflow: hidden; user-select: none;
            display: flex; flex-direction: column;
        }

        /* 竖屏 UI */
        #portrait-layout { display: flex; flex-direction: column; height: 100%; width: 100%; }
        header { height: 50px; background: #222; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px;}
        main { flex: 1; }
        .tab-content { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .tab-content.active { display: flex; }
        nav { height: 60px; background: #222; border-top: 1px solid #333; display: flex; }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; color: #888; font-size: 0.9rem;}
        .nav-btn.active { color: var(--primary-accent); }

        /* 横屏手柄 UI */
        #landscape-gamepad {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 50%, #3a3a3a 0%, #1a1a1a 100%);
            z-index: 9999; display: none; transform-origin: center center;
        }
        
        #landscape-gamepad.rotated {
            width: 100vh; height: 100vw; transform: rotate(90deg);
            top: 50%; left: 50%; margin-left: -50vh; margin-top: -50vw;
        }

        /* 通用组件 */
        .gp-btn, .trigger, .shoulder, .dpad-key, .btn-menu {
            position: absolute; background: var(--glass-bg); 
            border: 1px solid var(--glass-border); backdrop-filter: blur(8px);
            /* 移除 transform transition，只保留颜色过渡，解决位移问题 */
            transition: background 0.05s, border-color 0.05s, box-shadow 0.05s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        /* 按下状态 - 修复位移问题 */
        .gp-btn:active, .trigger:active, .shoulder:active, .dpad-key:active, .btn-menu:active {
            background: var(--active-bg); border-color: var(--active-border); color: #333;
            /* 关键修改：不再使用 transform: scale() */
            /* 改用内阴影制造按压感，位置绝对不动 */
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
            z-index: 500;
        }

        /* --- 退出按钮 --- */
        .exit-pill {
            position: absolute; top: 2vmin; left: 50%; transform: translateX(-50%);
            padding: 1vmin 4vmin; border-radius: 20px;
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1);
            color: #aaa; font-size: 3vmin; z-index: 300; pointer-events: auto; white-space: nowrap;
        }
        .exit-pill:active { background: #d32f2f; color: #fff; }

        /* --- 扳机 & 肩键 --- */
        .trigger {
            top: 0; width: 25vmin; height: 8vmin; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            font-size: 3vmin; color: #ccc; letter-spacing: 1px; border-radius: 0 0 10px 10px;
            border-top: none; 
        }
        .tr-l { left: 4vmin; } 
        .tr-r { right: 4vmin; }

        .shoulder {
            top: 9vmin; width: 25vmin; height: 7vmin; z-index: 50;
            display: flex; align-items: center; justify-content: center; 
            color: #eee; font-weight: bold; font-size: 3vmin; border-radius: 10px;
        }
        .sh-l { left: 4vmin; }
        .sh-r { right: 4vmin; }

        /* --- 摇杆区域 --- */
        .stick-zone {
            position: absolute; 
            width: var(--stick-size); height: var(--stick-size); 
            border-radius: 50%;
            background: radial-gradient(circle, #444 0%, #222 70%);
            border: 2px solid #555; touch-action: none; z-index: 60;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .stick-knob {
            position: absolute; top: 50%; left: 50%; 
            width: 40%; height: 40%; 
            background: #333; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.8); pointer-events: none;
            border: 1px solid #555;
            background-image: radial-gradient(circle at 30% 30%, #555 0%, #222 100%);
        }
        .stick-zone:active .stick-knob { background: #555; }
        
        .stick-l { bottom: 42vmin; left: 8vmin; }
        .stick-r { bottom: 6vmin; right: 26vmin; }

        /* --- ABXY --- */
        .abxy-zone { 
            position: absolute; top: 25vmin; right: 5vmin; 
            width: 32vmin; height: 32vmin; 
            transform: rotate(-10deg); z-index: 70;
        }
        .face-btn { 
            position: absolute; 
            width: var(--btn-size); height: var(--btn-size); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 5vmin;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .face-btn span { transform: rotate(10deg); }
        .btn-y { top: 0; left: 50%; transform: translateX(-50%); color: #ffca28; }
        .btn-x { top: 50%; left: 0; transform: translateY(-50%); color: #42a5f5; }
        .btn-b { top: 50%; right: 0; transform: translateY(-50%); color: #ef5350; }
        .btn-a { bottom: 0; left: 50%; transform: translateX(-50%); color: #00ff88; }

        /* --- D-Pad --- */
        .dpad-zone { 
            position: absolute; bottom: 6vmin; left: 12vmin; 
            width: 30vmin; height: 30vmin; 
            z-index: 70;
        }
        .dp-btn { position: absolute; background: #333; border: 1px solid #555; }
        .dp-u { top: 0; left: 34%; width: 32%; height: 34%; border-radius: 1vmin 1vmin 0 0; }
        .dp-d { bottom: 0; left: 34%; width: 32%; height: 34%; border-radius: 0 0 1vmin 1vmin; }
        .dp-l { top: 34%; left: 0; width: 34%; height: 32%; border-radius: 1vmin 0 0 1vmin; }
        .dp-r { top: 34%; right: 0; width: 34%; height: 32%; border-radius: 0 1vmin 1vmin 0; }
        .dp-c { top: 34%; left: 34%; width: 32%; height: 32%; background: #222; border:none; z-index: 2; pointer-events: none;}

        /* --- Start/Select 修复 --- */
        .center-stack { 
            position: absolute; bottom: 2vmin; left: 50%; transform: translateX(-50%); 
            display: flex; 
            /* 关键修复：使用 space-between 强行拉开间距，并给足宽度 */
            justify-content: space-between;
            width: 40vmin; 
            z-index: 900; 
            pointer-events: none; 
        }
        .btn-menu { 
            /* 稍微调小一点宽度，防止挤压 */
            width: 12vmin; height: 6vmin; 
            border-radius: 3vmin; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2vmin; color: #aaa; background: rgba(0,0,0,0.6);
            pointer-events: auto; 
            /* 确保相对定位正确 */
            position: relative; 
            left: auto; top: auto; right: auto; bottom: auto;
        }

        /* 仪表盘 */
        .dashboard { width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .metrics { width: 90%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .metric-card {
            background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
            padding: 14px 10px; text-align: center; box-shadow: 0 6px 16px rgba(0,0,0,0.35);
        }
        .metric-label { font-size: 0.72rem; color: #9aa0a6; letter-spacing: 0.08em; }
        .metric-value { font-size: 2.2rem; font-weight: 700; color: var(--primary-accent); line-height: 1.1; }
        .metric-value.inactive { color: #555; }
        .metric-unit { font-size: 0.75rem; color: #777; margin-left: 6px; }
        .status-line { font-size: 0.85rem; color: #888; padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.04); }
        .controls { width: 90%; max-width: 520px; display: flex; flex-direction: column; gap: 12px; }
        .ctrl-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .ctrl-btn {
            background: #202020; border: 1px solid #3a3a3a; border-radius: 12px; color: #ddd;
            padding: 12px 10px; font-size: 0.95rem; letter-spacing: 0.05em;
            box-shadow: 0 6px 14px rgba(0,0,0,0.35);
        }
        .ctrl-btn.primary { background: #00ff88; color: #0a1a12; border-color: #00ff88; font-weight: 700; }
        .ctrl-btn.danger { background: #3a1c1c; color: #ffb3b3; border-color: #5a2b2b; font-weight: 700; }
        .ctrl-btn.loading { position: relative; color: #999; }
        .ctrl-btn.loading::after {
            content: "";
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-left: 8px;
            border: 2px solid #666;
            border-top-color: var(--primary-accent);
            border-radius: 50%;
            animation: btnspin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes btnspin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .dial-box {
            background: #1b1b1b; border: 1px solid #333; border-radius: 14px; padding: 14px 16px;
            display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.35);
        }
        .dial-label { font-size: 0.8rem; color: #9aa0a6; letter-spacing: 0.08em; }
        .dial-value { font-size: 1.4rem; color: var(--primary-accent); font-weight: 700; text-align: right; }
        .dial-range { grid-column: 1 / -1; appearance: none; width: 100%; height: 8px; border-radius: 999px;
            background: linear-gradient(90deg, #00ff88 0%, #0f6 40%, #2b2b2b 40%);
            outline: none;
        }
        .dial-range::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: #00ff88; border: 2px solid #0b1a12; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .dial-range::-moz-range-thumb {
            width: 22px; height: 22px; border-radius: 50%;
            background: #00ff88; border: 2px solid #0b1a12; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .dial-box.inactive .dial-label,
        .dial-box.inactive .dial-value { color: #666; }
        .dial-box.inactive .dial-range { background: #333; }
        .dial-box.inactive .dial-range::-webkit-slider-thumb {
            background: #666; border-color: #333; box-shadow: none;
        }
        .dial-box.inactive .dial-range::-moz-range-thumb {
            background: #666; border-color: #333; box-shadow: none;
        }
        .dial-scale { display: flex; justify-content: space-between; font-size: 0.7rem; color: #666; }
        .cfg-box { width: 90%; max-width: 400px; padding: 20px; background: #222; border-radius: 10px; }
        select { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #444; margin-top: 10px; border-radius: 5px; }

        .history-wrap { width: 92%; max-width: 640px; height: 100%; display: flex; flex-direction: column; gap: 12px; padding-top: 10px; }
        .history-header { width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .history-title { font-size: 1rem; letter-spacing: 0.08em; color: #9aa0a6; }
        .history-list { width: 100%; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-bottom: 80px; }
        .history-card {
            background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
            padding: 12px 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.35);
            display: grid; grid-template-columns: 1fr auto; gap: 8px;
        }
        .history-main { display: flex; flex-direction: column; gap: 6px; }
        .history-time { font-size: 0.95rem; color: #e0e0e0; }
        .history-sub { font-size: 0.8rem; color: #888; }
        .history-metrics { text-align: right; font-size: 0.85rem; color: #9aa0a6; }
        .history-empty { color: #777; font-size: 0.9rem; padding: 20px 0; text-align: center; }

        @media (max-width: 420px) {
            .metrics { grid-template-columns: 1fr; }
            .ctrl-row { grid-template-columns: 1fr; }
        }
        @media (orientation: portrait) {
            .history-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="portrait-layout">
        <header>
            <span style="color:var(--primary-accent); font-weight:bold;">Keep</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="joycon-battery" style="font-size:0.8rem; color:#aaa">JoyCon: --</span>
            </div>
        </header>
        <main>
            <div id="tab-bike" class="tab-content active">
                <div class="dashboard">
                    <div class="metrics">
                        <div class="metric-card">
                            <div class="metric-label">踏频</div>
                            <div class="metric-value inactive"><span id="rpm-val">--</span><span class="metric-unit">RPM</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">功率</div>
                            <div class="metric-value inactive"><span id="power-val">--</span><span class="metric-unit">W</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">速度</div>
                            <div class="metric-value inactive"><span id="speed-val">--</span><span class="metric-unit">km/h</span></div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">阻力</div>
                            <div class="metric-value inactive"><span id="resist-val">--</span><span class="metric-unit">Lv</span></div>
                        </div>
                    </div>
                    <div id="bt-status" class="status-line">获取单车状态中…</div>
                    <div id="session-time" class="status-line">本次时长 --:--</div>
                    <div class="controls">
                        <div class="ctrl-row">
                            <button id="start-btn" class="ctrl-btn primary" onclick="sendControl('start')">开始</button>
                            <button class="ctrl-btn" onclick="sendControl('pause')">暂停</button>
                            <button class="ctrl-btn danger" onclick="sendControl('stop')">停止</button>
                        </div>
                        <div id="resistance-box" class="dial-box">
                            <div class="dial-label">阻力调节</div>
                            <div class="dial-value"><span id="resist-display">1</span></div>
                            <input id="resistance-dial" class="dial-range" type="range" min="1" max="24" step="1" value="1" disabled>
                            <div class="dial-scale">
                                <span>1</span>
                                <span>24</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="tab-config" class="tab-content">
                <div class="cfg-box">
                    <!--
                    <label>输入源设置 (自动协调模式)</label>
                    <select disabled>
                        <option value="auto">混合模式 (优先单车)</option>
                    </select>

                    <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">
                    -->

                    <label>FTMS 服务</label>
                    <div style="display:flex; align-items:center; justify-content:space-between; margin:10px 0;">
                        <span id="ftms-status" style="color:#888;">状态：--</span>
                        <button id="ftms-toggle" class="ctrl-btn" style="padding:8px 12px;" onclick="toggleFTMS()">--</button>
                    </div>
                    <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">

                    <label>🚴 单车映射目标</label>
                    <select id="bike-target" onchange="sendBikeConfig()">
                        <option value="disabled">-- 禁用映射 --</option>
                        <optgroup label="模拟摇杆 (方案A)">
                            <option value="ly_inv">左摇杆 - 上推 (前进)</option>
                            <option value="ly">左摇杆 - 下推</option>
                            <option value="lx_inv">左摇杆 - 左推</option>
                            <option value="lx">左摇杆 - 右推</option>
                            <option value="ry_inv">右摇杆 - 上推 (油门)</option>
                            <option value="ry">右摇杆 - 下推</option>
                        </optgroup>
                        <optgroup label="线性扳机 (方案A)">
                            <option value="lt">左扳机 (LT)</option>
                            <option value="rt">右扳机 (RT)</option>
                        </optgroup>
                        <optgroup label="数字按钮 (方案B)">
                            <option value="btn_a">按键 A</option>
                            <option value="btn_b">按键 B</option>
                            <option value="btn_x">按键 X</option>
                            <option value="btn_y">按键 Y</option>
                            <option value="btn_lb">左肩键 (LB)</option>
                            <option value="btn_rb">右肩键 (RB)</option>
                            <option value="btn_start">START</option>
                            <option value="btn_select">SELECT</option>
                        </optgroup>
                    </select>

                    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                        <label>最大 RPM (满量程)</label>
                        <span id="max-rpm-display" style="color:var(--primary-accent)">90</span>
                    </div>
                    <input type="range" id="bike-max-rpm" min="30" max="160" value="90" step="5" 
                        style="width:100%; margin-top:10px;" 
                        oninput="document.getElementById('max-rpm-display').innerText=this.value" 
                        onchange="sendBikeConfig()">
                </div>
            </div>
            <div id="tab-history" class="tab-content">
                <div class="history-wrap">
                    <div class="history-header">
                        <div class="history-title">历史记录</div>
                        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
                            <input id="history-from" type="date" style="background:#111; color:#eee; border:1px solid #444; border-radius:6px; padding:6px 8px;">
                            <input id="history-to" type="date" style="background:#111; color:#eee; border:1px solid #444; border-radius:6px; padding:6px 8px;">
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="applyHistoryFilter()">筛选</button>
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="clearHistoryFilter()">清空</button>
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="refreshHistory()">刷新</button>
                            <button class="ctrl-btn" style="padding:8px 12px;" onclick="exportHistoryCSV()">导出 CSV</button>
                        </div>
                    </div>
                    <div id="history-list" class="history-list">
                        <div class="history-empty">暂无记录</div>
                    </div>
                </div>
            </div>
        </main>
        <nav>
            <div class="nav-btn active" onclick="switchTab('bike', this)">🚴 单车</div>
            <div class="nav-btn" onclick="enterGamepad()">🎮 手柄</div>
            <div class="nav-btn" onclick="switchTab('history', this); refreshHistory()">📜 记录</div>
            <div class="nav-btn" onclick="switchTab('config', this)">⚙️ 设置</div>
        </nav>
    </div>

    <div id="landscape-gamepad">
        <div class="exit-pill" onclick="exitGamepad()">✕ 退出</div>

        <div class="trigger tr-l" ontouchstart="trigger(0,255)" ontouchend="trigger(0,128)">LT</div>
        <div class="trigger tr-r" ontouchstart="trigger(1,255)" ontouchend="trigger(1,128)">RT</div>

        <div class="shoulder sh-l" ontouchstart="btn(5,1)" ontouchend="btn(5,0)">LB</div>
        <div class="shoulder sh-r" ontouchstart="btn(6,1)" ontouchend="btn(6,0)">RB</div>

        <div class="stick-zone stick-l" id="stick-l">
            <div class="stick-knob"></div>
        </div>

        <div class="dpad-zone">
            <div class="dpad-key dp-btn dp-u" ontouchstart="btn(13,1)" ontouchend="btn(13,0)"></div>
            <div class="dpad-key dp-btn dp-l" ontouchstart="btn(15,1)" ontouchend="btn(15,0)"></div>
            <div class="dpad-key dp-c"></div>
            <div class="dpad-key dp-btn dp-r" ontouchstart="btn(16,1)" ontouchend="btn(16,0)"></div>
            <div class="dpad-key dp-btn dp-d" ontouchstart="btn(14,1)" ontouchend="btn(14,0)"></div>
        </div>

        <div class="abxy-zone">
            <div class="gp-btn face-btn btn-y" ontouchstart="btn(4,1)" ontouchend="btn(4,0)"><span>Y</span></div>
            <div class="gp-btn face-btn btn-x" ontouchstart="btn(3,1)" ontouchend="btn(3,0)"><span>X</span></div>
            <div class="gp-btn face-btn btn-b" ontouchstart="btn(2,1)" ontouchend="btn(2,0)"><span>B</span></div>
            <div class="gp-btn face-btn btn-a" ontouchstart="btn(1,1)" ontouchend="btn(1,0)"><span>A</span></div>
        </div>

        <div class="stick-zone stick-r" id="stick-r">
            <div class="stick-knob"></div>
        </div>

        <div class="center-stack">
            <div class="btn-menu" ontouchstart="btn(7,1)" ontouchend="btn(7,0)">SELECT</div>
            <div class="btn-menu" ontouchstart="btn(8,1)" ontouchend="btn(8,0)">START</div>
        </div>
    </div>

    <script>
        let ws = null;
        let wsReconnectTimer = null;
        let wsRetryMs = 1000;
        const WS_RETRY_MAX_MS = 10000;
        let wsConnected = false;
        let lastWsDisconnectAt = 0;
        let lastWsOpenAt = 0;

        function handleWsMessage(event) {
            try {
                const msg = JSON.parse(event.data);
            if (msg.type === 'bike_data') {
                lastBikeDataAt = Date.now();
                lastBikeMsgAt = Date.now();
                if (!bikeConnected) setConnectedState(true);
                    if (typeof msg.status === 'number') lastStatusCode = msg.status;
                    if (rpmEl) rpmEl.innerText = (typeof msg.rpm === 'number') ? msg.rpm : "--";
                    if (powerEl) powerEl.innerText = (typeof msg.power === 'number') ? msg.power : "--";
                    if (speedEl) speedEl.innerText = (typeof msg.speed === 'number') ? msg.speed : "--";
                    if (resistValEl && typeof msg.resistance === 'number') {
                        if (Date.now() - lastResistanceSetAt < RESISTANCE_SETTLE_MS) {
                            // 等待单车反应，暂不覆盖前端显示
                        } else {
                        resistValEl.innerText = msg.resistance;
                        if (!resistanceDragging) setDialValue(msg.resistance);
                        }
                    }
                    applyUIState();
            } else if (msg.type === 'bike_status') {
                lastBikeDataAt = Date.now();
                lastBikeMsgAt = Date.now();
                setActiveState(!!msg.active);
                if (typeof msg.reconnect_interval_sec === 'number' && msg.reconnect_interval_sec > 0) {
                    reconnectIntervalSec = Math.round(msg.reconnect_interval_sec);
                    hasReconnectInterval = true;
                }
                    if (typeof msg.status_name === 'string') lastStatusName = msg.status_name;
                    if (typeof msg.status_code === 'number') lastStatusCode = msg.status_code;
                    if (!bikeConnected) {
                        applyUIState();
                    } else if (!msg.active && rpmEl) {
                        // 状态变 Idle 时，前端也强制将显示值归零
                        rpmEl.innerText = "0";
                        applyUIState();
                    }
                } else if (msg.type === 'joycon_battery') {
                    const side = msg.side;
                    const percent = (typeof msg.percent === 'number') ? Math.max(0, Math.min(100, msg.percent)) : null;
                    if (side === 'LEFT' || side === 'RIGHT') {
                        if (msg.connected === false) {
                            joyconBattery[side] = null;
                        } else {
                            joyconBattery[side] = percent;
                        }
                        renderJoyconBattery();
                    }
            } else if (msg.type === 'session_state') {
                lastBikeDataAt = Date.now();
                lastBikeMsgAt = Date.now();
                updateSessionState(msg.state, msg.active_duration_sec);
                setActiveState(msg.state === 'ACTIVE');
            }
            } catch (e) {}
        }

        function connectWebSocket() {
            ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:') + "//" + location.host + "/ws");
            ws.onmessage = handleWsMessage;

            ws.onopen = () => {
                wsConnected = true;
                lastWsOpenAt = Date.now();
                wsRetryMs = 1000;
                if (wsReconnectTimer) {
                    clearTimeout(wsReconnectTimer);
                    wsReconnectTimer = null;
                }
                applyUIState();
            };

            ws.onclose = () => {
                wsConnected = false;
                setConnectedState(false);
                lastWsDisconnectAt = Date.now();
                if (btStatusEl) {
                    btStatusEl.innerText = "正在重连服务器…";
                    btStatusEl.style.color = "#888";
                    btStatusEl.style.background = "none";
                }
                if (wsReconnectTimer) return;
                wsReconnectTimer = setTimeout(() => {
                    wsReconnectTimer = null;
                    wsRetryMs = Math.min(WS_RETRY_MAX_MS, wsRetryMs * 2);
                    connectWebSocket();
                }, wsRetryMs);
            };
        }

        const sessionTimeEl = document.getElementById('session-time');
        let sessionTimer = null;
        let sessionBase = 0;
        let sessionStartClient = 0;

        function formatDuration(sec) {
            const s = Math.max(0, parseInt(sec, 10));
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const r = s % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${r.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${r.toString().padStart(2,'0')}`;
        }

        function renderSessionTime(extraLabel) {
            if (!sessionTimeEl) return;
            const elapsed = sessionBase + Math.floor((Date.now() - sessionStartClient) / 1000);
            const label = extraLabel ? `本次时长 ${formatDuration(elapsed)} (${extraLabel})` : `本次时长 ${formatDuration(elapsed)}`;
            sessionTimeEl.innerText = label;
        }

        function updateSessionState(state, activeDuration) {
            sessionBase = activeDuration || 0;
            sessionStartClient = Date.now();
            if (sessionTimer) {
                clearInterval(sessionTimer);
                sessionTimer = null;
            }
            if (state === 'ACTIVE') {
                renderSessionTime();
                sessionTimer = setInterval(() => renderSessionTime(), 1000);
            } else if (state === 'PAUSED') {
                sessionStartClient = Date.now();
                renderSessionTime('暂停');
            } else {
                if (sessionTimeEl) sessionTimeEl.innerText = "本次时长 --:--";
            }
        }

        function formatDate(ts) {
            const d = new Date(ts * 1000);
            const yy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mi = String(d.getMinutes()).padStart(2, '0');
            return `${yy}-${mm}-${dd} ${hh}:${mi}`;
        }

        function renderHistory(items) {
            const list = document.getElementById('history-list');
            if (!list) return;
            list.innerHTML = '';
            if (!items || items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'history-empty';
                empty.innerText = '暂无记录';
                list.appendChild(empty);
                return;
            }
            items.forEach(it => {
                const card = document.createElement('div');
                card.className = 'history-card';
                const duration = formatDuration(it.active_duration_sec || 0);
                const start = formatDate(it.start_ts);
                const end = formatDate(it.end_ts);
                const avgPower = (it.avg_power == null) ? '--' : Math.round(it.avg_power);
                const avgSpeed = (it.avg_speed == null) ? '--' : it.avg_speed.toFixed(1);
                const avgRpm = (it.avg_rpm == null) ? '--' : Math.round(it.avg_rpm);
                const dist = (it.distance == null) ? '--' : `${it.distance} m`;
                card.innerHTML = `
                    <div class="history-main">
                        <div class="history-time">${start} - ${end}</div>
                        <div class="history-sub">时长 ${duration}</div>
                    </div>
                    <div class="history-metrics">
                        均功率 ${avgPower}W<br/>
                        均时速 ${avgSpeed}km/h<br/>
                        均踏频 ${avgRpm}RPM<br/>
                        里程 ${dist}
                    </div>

        function buildHistoryQuery() {
            const fromEl = document.getElementById('history-from');
            const toEl = document.getElementById('history-to');
            const fromVal = fromEl ? fromEl.value : '';
            const toVal = toEl ? toEl.value : '';
            const parts = [];
            if (fromVal) parts.push(`from=${encodeURIComponent(fromVal)}`);
            if (toVal) parts.push(`to=${encodeURIComponent(toVal)}`);
            return parts.length ? `&${parts.join('&')}` : '';
        }

        function setDefaultHistoryRange() {

            if (!fromEl || !toEl) return;
            const today = new Date();
            const toStr = today.toISOString().slice(0, 10);
            const fromDate = new Date(today.getTime() - 6 * 24 * 60 * 60 * 1000);
            const fromStr = fromDate.toISOString().slice(0, 10);
            if (!fromEl.value) fromEl.value = fromStr;

        function exportHistoryCSV() {
            const qs = buildHistoryQuery();
            fetch(`/api/sessions?page=1&page_size=200${qs}`)
                .then(r => r.json())
                .then(data => {
                    const items = (data && data.items) ? data.items : [];
                    if (items.length === 0) {
                        alert('暂无可导出的记录');
                        return;
                    }
                    const rows = [];
                    rows.push(['开始时间','结束时间','时长','均功率(W)','均时速(km/h)','均踏频(RPM)','里程(m)']);
                    items.forEach(it => {
                        const duration = formatDuration(it.active_duration_sec || 0);
                        const start = formatDate(it.start_ts);
                        const end = formatDate(it.end_ts);
                        const avgPower = (it.avg_power == null) ? '' : Math.round(it.avg_power);
                        const avgSpeed = (it.avg_speed == null) ? '' : Number(it.avg_speed).toFixed(1);
                        const avgRpm = (it.avg_rpm == null) ? '' : Math.round(it.avg_rpm);
                        const dist = (it.distance == null) ? '' : it.distance;
                        rows.push([start, end, duration, avgPower, avgSpeed, avgRpm, dist]);
                    });
                    const csv = rows.map(r => r.map(v => {
                        const s = String(v ?? '');
                        if (s.includes('"')) return `"${s.replace(/"/g, '""')}"`;
                        if (s.includes(',') || s.includes('\n')) return `"${s}"`;
                        return s;
                    }).join(',')).join('\n');
                    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    const ts = new Date();
                    const yyyy = ts.getFullYear();
                    const mm = String(ts.getMonth() + 1).padStart(2, '0');
                    const dd = String(ts.getDate()).padStart(2, '0');
                    const hh = String(ts.getHours()).padStart(2, '0');
                    const mi = String(ts.getMinutes()).padStart(2, '0');
                    a.href = url;
                    a.download = `bike_history_${yyyy}${mm}${dd}_${hh}${mi}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                })
                .catch(() => {
                    alert('导出失败，请稍后重试');
                });
        }

        function setMetricColor(el, isActive) {

        function setDashboardPlaceholders() {

        function getReconnectRemainingSec() {
            if (!lastDisconnectAt) return reconnectIntervalSec;
            const elapsed = Math.floor((Date.now() - lastDisconnectAt) / 1000);
            let rem = reconnectIntervalSec - (elapsed % reconnectIntervalSec);
            if (rem <= 0) rem = reconnectIntervalSec;
            return rem;
        }

        function getWsReconnectRemainingSec() {
            if (!lastWsDisconnectAt) return Math.ceil(wsRetryMs / 1000);
            const elapsed = Date.now() - lastWsDisconnectAt;
            const remainMs = Math.max(0, wsRetryMs - elapsed);
            return Math.max(1, Math.ceil(remainMs / 1000));
        }

        function getStatusLabel() {
            if (!wsConnected) {
                return `正在重连服务器，${getWsReconnectRemainingSec()}秒后重试…`;
            }
            if (!bikeConnected) {
                if (!hasBikeEverConnected) {
                    return "获取单车状态中…";
                }
                if (!lastBikeMsgAt && lastWsOpenAt && (Date.now() - lastWsOpenAt < BIKE_SYNC_GRACE_MS)) {
                    return "获取单车状态中…";
                }
                if (!hasReconnectInterval) {
                    return "离线，重连中……";
                }
                return `离线，${getReconnectRemainingSec()}秒后重连`;
            }
            const name = lastStatusName;
            if (name === 'ACTIVE') return "骑行中";
            if (name === 'READY') return "待机";
            if (name === 'TRANSITION') return "准备";
            if (name === 'PAUSED') return "暂停中";
            if (name === 'UNKNOWN') return "未知";
            if (lastStatusCode === 3) return "骑行中";
            if (lastStatusCode === 1) return "待机";
            if (lastStatusCode === 2) return "准备";
            if (lastStatusCode === 4) return "暂停中";
            return bikeActive ? "骑行中" : "待机";

        function isTransitionState() {

                startBtn.innerText = isPaused ? "恢复" : "开始";

            if (!bikeConnected) {
                if (btStatusEl) {

                    btStatusEl.style.background = "none";

            setMetricColor(rpmEl, active);

        function updateDialBackground(el) {
            if (!el) return;
            const min = parseInt(el.min, 10);
            const max = parseInt(el.max, 10);
            const val = parseInt(el.value, 10);
            const pct = Math.max(0, Math.min(100, ((val - min) / (max - min)) * 100));
            el.style.background = `linear-gradient(90deg, #00ff88 0%, #0f6 ${pct}%, #2b2b2b ${pct}%)`;
        }

        function setDialValue(val) {
            if (!resistanceDial) return;
            const v = Math.max(parseInt(resistanceDial.min, 10), Math.min(parseInt(resistanceDial.max, 10), parseInt(val, 10)));
            resistanceDial.value = v;

            if (bikeActive && bikeConnected) {
                updateDialBackground(resistanceDial);
            } else {
                resistanceDial.style.background = "#333";
            }
        }

        if (resistanceDial) {

            } else {

            resistanceDial.addEventListener('pointerdown', () => { resistanceDragging = true; });
            resistanceDial.addEventListener('pointerup', () => { resistanceDragging = false; });
            resistanceDial.addEventListener('pointercancel', () => { resistanceDragging = false; });
            resistanceDial.addEventListener('input', (e) => {
                const v = e.target.value;
                if (resistDisplay) resistDisplay.innerText = v;
                if (resistValEl) resistValEl.innerText = v;
                if (bikeActive && bikeConnected) updateDialBackground(resistanceDial);

        // --- 摇杆逻辑 (视觉/数据坐标解耦修复版) ---
        function initStick(elmId, side) {
            const zone = document.getElementById(elmId);
            const knob = zone.querySelector('.stick-knob');
            const gamepadContainer = document.getElementById('landscape-gamepad');

            let lastSend = 0;

            function update(dx, dy, force=false) {
                const now = Date.now();
                if (!force && now - lastSend < 20) return;
                lastSend = now;

                // --- 1. 计算最大物理移动半径 ---
                // zone.width/2 (底座半径) - knob.width/2 (球半径)
                // 这样当球边缘碰到底座边缘时，圆心移动距离就是 maxDist
                const maxDist = zone.offsetWidth / 2 - knob.offsetWidth / 2;
                
                if (maxDist <= 0) return;

                // --- 2. 视觉层修正 (Visual Layer) ---
                // 让摇杆球看起来跟随手指
                let visualX = dx;
                let visualY = dy;

                if (gamepadContainer.classList.contains('rotated')) {
                    // 竖屏强转模式下，视觉坐标系旋转了 90度
                    // 物理右(dx+) -> 视觉上(vy-)
                    // 物理下(dy+) -> 视觉右(vx+)
                    visualX = dy;
                    visualY = -dx;
                }
                knob.style.transform = `translate(calc(-50% + ${visualX}px), calc(-50% + ${visualY}px))`;

                // --- 3. 数据层修正 (Data Layer) ---
                // 核心修正：数据层永远对应物理手势！
                // 物理向右推 (dx > 0) -> 发送 X > 128
                // 物理向下推 (dy > 0) -> 发送 Y > 128
                
                // 这里不需要检测 rotated！
                // 因为当用户竖屏玩时，他往“物理右侧”推，就是想让游戏角色往右走
                // 即使屏幕画面是转过来的，操作直觉依然是基于物理方向的
                
                // 唯一需要注意的是，如果用户是横着拿手机（顶部朝左/右）
                // 那么物理坐标系本身相对于人眼就变了。
                
                // 假设用户是把手机横过来拿（Home键在右）：
                // 物理上(dy-) -> 人眼左 -> Game Left (X-)
                // 物理右(dx+) -> 人眼上 -> Game Up (Y-)
                
                // 让我们根据之前的反馈来修正：
                // "右摇杆往右，传入了Y轴数据，但应该是X轴"
                // 这说明之前代码里的 finalX = y 把轴换错了。
                
                let gameX = dx;
                let gameY = dy;

                if (gamepadContainer.classList.contains('rotated')) {
                    gameX = dy;
                    gameY = -dx;
                }

                // 数值归一化 (0-255)
                // 确保 range 能够达到 0 和 255
                // 使用 clamp 防止溢出
                const normalize = (val) => {
                    let v = ((val / maxDist) + 1) / 2 * 255;
                    return Math.max(0, Math.min(255, Math.round(v)));
                };

                const valX = normalize(gameX);
                const valY = normalize(gameY);
                
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({type: 'axis', source: 'virtual', stick: side, x: valX, y: valY}));
                }
            }

            zone.addEventListener('touchstart', e => {
                e.preventDefault();
                const rect = zone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // 重新计算 maxDist，确保准确
                // 关键修正：必须减去球体半径！否则推不到顶！
                const maxDist = zone.offsetWidth / 2 - knob.offsetWidth / 2;

                const moveHandler = (em) => {
                    const tm = em.targetTouches[0];
                    let dx = tm.clientX - centerX;
                    let dy = tm.clientY - centerY;
                    
                    // 限制在圆形范围内
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > maxDist) {
                        const ratio = maxDist / dist;
                        dx *= ratio; dy *= ratio;
                    }
                    
                    update(dx, dy);
                };
                const endHandler = () => {
                    update(0, 0, true);
                    zone.removeEventListener('touchmove', moveHandler);
                    zone.removeEventListener('touchend', endHandler);
                };
                zone.addEventListener('touchmove', moveHandler);
                zone.addEventListener('touchend', endHandler);
            });
        }
        
        setTimeout(() => {
            initStick('stick-l', 'left');
            initStick('stick-r', 'right');
        }, 500);

        setInterval(() => {
            if (lastBikeDataAt && Date.now() - lastBikeDataAt > BIKE_DATA_STALE_MS) {
                setConnectedState(false);
            }
            if (!bikeConnected) {
                applyUIState();
            }
        }, 1000);

        function enterGamepad() {
            const gp = document.getElementById('landscape-gamepad');
            const pt = document.getElementById('portrait-layout');
            gp.style.display = 'block'; pt.style.display = 'none';
            if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            checkRot();
        }
        function exitGamepad() {
            const gp = document.getElementById('landscape-gamepad');
            const pt = document.getElementById('portrait-layout');
            gp.style.display = 'none'; pt.style.display = 'flex';
            gp.classList.remove('rotated');
            if(document.exitFullscreen) document.exitFullscreen();
        }
        function checkRot() {
            const gp = document.getElementById('landscape-gamepad');
            // 判断逻辑：只要高大于宽，就加旋转类
            if(window.innerHeight > window.innerWidth) gp.classList.add('rotated');
            else gp.classList.remove('rotated');
        }
        window.addEventListener('resize', () => { if(document.getElementById('landscape-gamepad').style.display === 'block') checkRot(); });
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(d => d.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            el.classList.add('active');
        }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
